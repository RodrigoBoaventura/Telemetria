<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Telemetria em Tempo Real</h2>

<p>Velocidade: <span id="velocidade">0</span> km/h</p>
<p>RPM: <span id="rpm">0</span></p>
<p>Combustível: <span id="combustivel">0</span>%</p>
<p>Produtividade: <span id="produtividade">0</span>%</p>

<canvas id="grafico"></canvas>

<script>
const ws = new WebSocket('wss://telemetria-production.up.railway.app');

const ctx = document.getElementById('grafico');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: [],
    datasets: [{
      label: 'Velocidade',
      data: []
    }]
  }
});

ws.onmessage = (event) => {
  const dados = JSON.parse(event.data);

  document.getElementById('velocidade').innerText = dados.velocidade;
  document.getElementById('rpm').innerText = dados.rpm;
  document.getElementById('combustivel').innerText = dados.combustivel;
  document.getElementById('produtividade').innerText = dados.produtividade;

  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(dados.velocidade);

  if (chart.data.labels.length > 10) {
    chart.data.labels.shift();
    chart.data.datasets[0].data.shift();
  }

  chart.update();
};
</script>

</body>
</html>
